<div class="products-container">
  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>

  <!-- Produtos -->
  <div *ngIf="!loading && products.length > 0" class="row g-4">
    <div *ngFor="let product of products" class="col-md-4 col-sm-6">
      <app-product-card [product]="product" (favoriteToggle)="onFavoriteToggle($event)">
      </app-product-card>
    </div>
  </div>

  <!-- Sem resultados -->
  <div *ngIf="!loading && products.length === 0" class="text-center py-5">
    <i class="bi bi-inbox display-1 text-muted"></i>
    <h3 class="mt-3">Nenhum produto encontrado</h3>
    <p class="text-muted">Tente ajustar os filtros ou buscar por outro termo</p>
  </div>

  <!-- Paginação -->
  <app-pagination
    *ngIf="!loading && totalProducts > 0"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    [totalItems]="totalProducts"
    [itemsPerPage]="itemsPerPage"
    (pageChange)="onPageChange($event)"
  >
  </app-pagination>
</div>
