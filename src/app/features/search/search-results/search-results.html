<div class="container py-4">
  <!-- Cabeçalho -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <button class="btn btn-outline-secondary rounded-pill me-2"
              routerLink="/home">
        <i class="bi bi-arrow-left me-1"></i>
        Voltar
      </button>
      <h1 class="fw-bold mb-0 d-inline">
        <i class="bi bi-search me-2"></i>
        Resultados da Busca
      </h1>
      <p class="text-muted" *ngIf="!loading">
        Encontramos {{ totalProducts }} produtos
        <span *ngIf="filters.search">
          para "{{ filters.search }}"
        </span>
      </p>
    </div>
    <button class="btn btn-outline-primary rounded-pill d-lg-none"
            (click)="toggleFilters()">
      <i class="bi bi-funnel me-1"></i>
      Filtros
    </button>
  </div>

  <div class="row g-4">
    <!-- Filtros (Desktop) -->
    <div class="col-lg-3 d-none d-lg-block">
      <div class="card border-0 shadow-sm sticky-top" style="top: 100px;">
        <div class="card-body p-3">
          <app-search-filters
            [filters]="filters"
            (filtersChange)="onFiltersChange($event)"
            (clearFilters)="onClearFilters()">
          </app-search-filters>
        </div>
      </div>
    </div>

    <!-- Filtros (Mobile) -->
    <div class="col-12 d-lg-none" *ngIf="showFilters">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body p-3">
          <app-search-filters
            [filters]="filters"
            (filtersChange)="onFiltersChange($event)"
            (clearFilters)="onClearFilters()">
          </app-search-filters>
        </div>
      </div>
    </div>

    <!-- Lista de Produtos -->
    <div class="col-lg-9">
      <!-- Loading -->
      <div *ngIf="loading" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Carregando...</span>
        </div>
      </div>

      <!-- Produtos -->
      <div *ngIf="!loading && products.length > 0" class="row g-4">
        <div *ngFor="let product of products" class="col-md-4 col-sm-6">
          <app-product-card
            [product]="product"
            (favoriteToggle)="loadProducts()">
          </app-product-card>
        </div>
      </div>

      <!-- Sem resultados -->
      <div *ngIf="!loading && products.length === 0" class="text-center py-5">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <h3 class="mt-3">Nenhum produto encontrado</h3>
        <p class="text-muted">
          Tente ajustar os filtros ou buscar por outro termo
        </p>
        <button class="btn btn-outline-primary rounded-pill"
                (click)="onClearFilters()">
          <i class="bi bi-arrow-counterclockwise me-2"></i>
          Limpar filtros
        </button>
      </div>

      <!-- Paginação -->
      <div *ngIf="!loading && totalPages > 1" class="d-flex justify-content-center mt-4">
        <nav>
          <ul class="pagination">
            <li class="page-item" [class.disabled]="currentPage === 1">
              <button class="page-link" (click)="onPageChange(currentPage - 1)">
                <i class="bi bi-chevron-left"></i>
              </button>
            </li>
            <li *ngFor="let page of getPages()"
                class="page-item"
                [class.active]="page === currentPage">
              <button class="page-link" (click)="onPageChange(page)">
                {{ page }}
              </button>
            </li>
            <li class="page-item" [class.disabled]="currentPage === totalPages">
              <button class="page-link" (click)="onPageChange(currentPage + 1)">
                <i class="bi bi-chevron-right"></i>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</div>
