<nav
  class="navbar navbar-expand-lg sticky-top bg-white border-bottom"
  [class.scrolled]="isScrolled"
>
  <div class="container-fluid px-3 px-lg-5">
    <!-- Logo -->
    <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/home">
      <span class="fw-bold fs-4 bg-gradient-primary text-transparent">MarketHub</span>
    </a>

    <!-- Botão Mobile -->
    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarMain"
      aria-controls="navbarMain"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Conteúdo Colapsável -->
    <div class="collapse navbar-collapse" id="navbarMain">
      <!-- Barra de Pesquisa -->
      <div class="mx-auto w-100 w-lg-50 px-3 px-lg-4 my-3 my-lg-0">
        <div class="input-group shadow-sm rounded-pill overflow-hidden">
          <input
            type="text"
            class="form-control border-0 bg-light"
            placeholder="Buscar produtos, marcas e vendedores..."
            aria-label="Buscar"
          />
          <button class="btn btn-primary rounded-pill px-4" type="button">
            <i class="bi bi-search"></i>
          </button>
        </div>
      </div>

      <!-- Ícones e Ações -->
      <div class="d-flex align-items-center gap-2 gap-lg-3 ms-auto">
        <!-- Vender -->
        <a class="btn btn-outline-success rounded-pill px-3 px-lg-4" routerLink="/vender">
          <i class="bi bi-plus-circle me-1"></i>
          <span class="d-none d-md-inline">Vender</span>
        </a>

        <!-- Favoritos -->
        <a class="nav-link position-relative" routerLink="/favoritos">
          <i class="bi bi-heart fs-5"></i>
          <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
          >
            {{ favoritesCount }}
          </span>
        </a>

        <!-- Carrinho -->
        <a class="nav-link position-relative" routerLink="/carrinho">
          <i class="bi bi-cart3 fs-5"></i>
          <span
            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-primary"
          >
            {{ cartCount }}
            <span class="visually-hidden">itens no carrinho</span>
          </span>
        </a>

        <!-- Avatar/Usuário -->
        <div class="dropdown">
          <button
            class="btn btn-link text-dark text-decoration-none dropdown-toggle d-flex align-items-center gap-2"
            type="button"
            data-bs-toggle="dropdown"
          >
            <div class="rounded-circle bg-secondary bg-opacity-25 p-2">
              <i class="bi bi-person-circle fs-5"></i>
            </div>
            <span class="d-none d-lg-block">Minha Conta</span>
          </button>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
            <li>
              <a class="dropdown-item" routerLink="/perfil"
                ><i class="bi bi-person me-2"></i>Meu Perfil</a
              >
            </li>
            <li>
              <a class="dropdown-item" routerLink="/pedidos"
                ><i class="bi bi-box-seam me-2"></i>Meus Pedidos</a
              >
            </li>
            <li>
              <a class="dropdown-item" routerLink="/produtos/vendidos"
                ><i class="bi bi-shop me-2"></i>Vendas</a
              >
            </li>
            <li><hr class="dropdown-divider" /></li>
            <li>
              <a class="dropdown-item text-danger" href="#"
                ><i class="bi bi-box-arrow-right me-2"></i>Sair</a
              >
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</nav>

      <li class="nav-item">

      <li class="nav-item">
